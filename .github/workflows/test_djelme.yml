name: test_djelme

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-py
        with:
          python-version: '3.11'
      - run: pip install -U tox
      - name: alias pythonX.Y for tox
        run: alias python${{ steps.setup-py.outputs.python-version }}=${{ steps.setup-py.outputs.python-path }}
      - run: TOXENV=lint tox


  test:
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
        django: ['4.2', '5.1', '5.2']
        # TODO: elasticsearch: ['6', '7', '8', '9']
    runs-on: ubuntu-20.04
    services:
      elasticsearch:
        image: elasticsearch:6.8.23
        ports:
          - 9201:9200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: setup-py
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -U tox
      - run: alias python${{ steps.setup-py.outputs.python-version }}=${{ steps.setup-py.outputs.python-path }}
      - run: TOXENV=`echo 'py${{ matrix.python }}-django${{matrix.django}}' | sed 's/\.//g'` tox

